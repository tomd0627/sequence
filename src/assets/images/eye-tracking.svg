<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#f5f0e8"/>
  <!-- Caption strip -->
  <rect y="408" width="800" height="42" fill="#ede7d9"/>

  <!-- Header -->
  <text x="400" y="42" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7a6f61" letter-spacing="4">READING FIXATIONS &amp; SACCADES</text>
  <line x1="70" y1="52" x2="730" y2="52" stroke="#c9bfad" stroke-width="1"/>

  <!-- Body text — Pressmark §04 -->
  <text x="86" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1a1610">The eye does not read the way we imagine it does.</text>
  <text x="86" y="131" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1a1610">It does not glide smoothly across a line of text</text>
  <text x="86" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1a1610">the way a finger traces a sentence on a page.</text>
  <text x="86" y="201" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1a1610">It jumps &#x2014; rapid jerking movements called saccades,</text>
  <text x="86" y="236" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1a1610">interspersed with brief pauses called fixations.</text>
  <text x="86" y="271" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1a1610">We read in flashes.</text>

  <!-- Saccade paths (ink, thin) — forward saccades within each line -->
  <line x1="140" y1="88" x2="272" y2="88" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="272" y1="88" x2="388" y2="88" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="388" y1="88" x2="498" y2="88" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="498" y1="88" x2="598" y2="88" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <!-- Return sweep L1→L2 -->
  <path d="M 598,88 Q 340,100 118,123" stroke="#1a1610" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="4 3"/>

  <line x1="118" y1="123" x2="262" y2="123" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="262" y1="123" x2="390" y2="123" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="390" y1="123" x2="518" y2="123" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="518" y1="123" x2="628" y2="123" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <!-- Return sweep L2→L3 -->
  <path d="M 628,123 Q 350,135 132,158" stroke="#1a1610" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="4 3"/>

  <line x1="132" y1="158" x2="268" y2="158" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="268" y1="158" x2="388" y2="158" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="388" y1="158" x2="498" y2="158" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <!-- Return sweep L3→L4 -->
  <path d="M 498,158 Q 300,170 142,193" stroke="#1a1610" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="4 3"/>

  <line x1="142" y1="193" x2="290" y2="193" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="290" y1="193" x2="422" y2="193" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="422" y1="193" x2="535" y2="193" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="535" y1="193" x2="618" y2="193" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <!-- Return sweep L4→L5 -->
  <path d="M 618,193 Q 360,205 128,228" stroke="#1a1610" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="4 3"/>

  <line x1="128" y1="228" x2="268" y2="228" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="268" y1="228" x2="408" y2="228" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <line x1="408" y1="228" x2="542" y2="228" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <!-- Return sweep L5→L6 -->
  <path d="M 542,228 Q 320,240 128,263" stroke="#1a1610" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="4 3"/>

  <line x1="128" y1="263" x2="205" y2="263" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>

  <!-- Fixation circles — line 1 -->
  <circle cx="140" cy="88" r="8" fill="#c0432b" opacity="0.55"/>
  <circle cx="272" cy="88" r="11" fill="#c0432b" opacity="0.55"/>
  <circle cx="388" cy="88" r="7"  fill="#c0432b" opacity="0.55"/>
  <circle cx="498" cy="88" r="10" fill="#c0432b" opacity="0.55"/>
  <circle cx="598" cy="88" r="6"  fill="#c0432b" opacity="0.55"/>
  <!-- Line 2 -->
  <circle cx="118" cy="123" r="7"  fill="#c0432b" opacity="0.55"/>
  <circle cx="262" cy="123" r="12" fill="#c0432b" opacity="0.55"/>
  <circle cx="390" cy="123" r="8"  fill="#c0432b" opacity="0.55"/>
  <circle cx="518" cy="123" r="9"  fill="#c0432b" opacity="0.55"/>
  <circle cx="628" cy="123" r="6"  fill="#c0432b" opacity="0.55"/>
  <!-- Line 3 -->
  <circle cx="132" cy="158" r="9"  fill="#c0432b" opacity="0.55"/>
  <circle cx="268" cy="158" r="7"  fill="#c0432b" opacity="0.55"/>
  <circle cx="388" cy="158" r="11" fill="#c0432b" opacity="0.55"/>
  <circle cx="498" cy="158" r="7"  fill="#c0432b" opacity="0.55"/>
  <!-- Line 4 -->
  <circle cx="142" cy="193" r="8"  fill="#c0432b" opacity="0.55"/>
  <circle cx="290" cy="193" r="10" fill="#c0432b" opacity="0.55"/>
  <circle cx="422" cy="193" r="8"  fill="#c0432b" opacity="0.55"/>
  <circle cx="535" cy="193" r="12" fill="#c0432b" opacity="0.55"/>
  <circle cx="618" cy="193" r="6"  fill="#c0432b" opacity="0.55"/>
  <!-- Line 5 -->
  <circle cx="128" cy="228" r="7"  fill="#c0432b" opacity="0.55"/>
  <circle cx="268" cy="228" r="9"  fill="#c0432b" opacity="0.55"/>
  <circle cx="408" cy="228" r="11" fill="#c0432b" opacity="0.55"/>
  <circle cx="542" cy="228" r="8"  fill="#c0432b" opacity="0.55"/>
  <!-- Line 6 -->
  <circle cx="128" cy="263" r="10" fill="#c0432b" opacity="0.55"/>
  <circle cx="205" cy="263" r="7"  fill="#c0432b" opacity="0.55"/>

  <!-- Legend -->
  <line x1="86" y1="308" x2="730" y2="308" stroke="#c9bfad" stroke-width="1"/>
  <circle cx="100" cy="330" r="7" fill="#c0432b" opacity="0.55"/>
  <text x="115" y="335" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7a6f61">Fixation — duration shown by circle size</text>
  <line x1="360" y1="330" x2="402" y2="330" stroke="#1a1610" stroke-width="1.2" opacity="0.4" stroke-dasharray="4 3"/>
  <text x="414" y="335" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7a6f61">Return sweep</text>
  <line x1="516" y1="330" x2="558" y2="330" stroke="#1a1610" stroke-width="1.2" opacity="0.4"/>
  <text x="570" y="335" font-family="'Courier New', Courier, monospace" font-size="11" fill="#7a6f61">Saccade</text>

  <!-- Caption rule + label -->
  <line x1="70" y1="416" x2="730" y2="416" stroke="#c9bfad" stroke-width="1"/>
  <text x="400" y="437" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#7a6f61">Eye-tracking visualisation — fixations and saccades on continuous prose</text>
</svg>
